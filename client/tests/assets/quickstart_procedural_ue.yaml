db:
  db_author: aerial
  db_host: clickhouse
  db_port: 9000
  opt_in_tables:
  - cirs
  opt_in_tables_options:
    raypaths: full
  parquet_export:
    compression: zstd
    iceberg:
      catalog_name: default
      catalog_type: rest
      catalog_uri: http://nessie:19120/iceberg
      nessie_ref: main
    max_workers: 2
    s3_configs:
    - access_key: minioadmin
      bucket: aerial-data
      endpoint_url: http://minio:9000
      nodes:
      - node1
      provider: minio
      region: us-east-1
      secret_key: minioadmin
      use_ssl: false
    timesteps_per_file: 100
    verify_exports: true
  s3_config:
    access_key: minioadmin
    bucket: aerial-data
    endpoint_url: http://minio:9000
    provider: minio
    region: us-east-1
    secret_key: minioadmin
  sim_id: quickstart_procedural_ue
gis:
  scene:
    scene_url: test_data/maps/tokyo
  spawn_zone:
    points_ccw:
    - lat: 35.665938
      lon: 139.740472
    - lat: 35.665938
      lon: 139.746
    - lat: 35.661446
      lon: 139.746
    - lat: 35.661446
      lon: 139.740472
    - lat: 35.665938
      lon: 139.743236
  vegetation:
    active: false
    geojson: []
sim:
  DUs:
    add:
    - id: 1
      position:
        pos:
          x: 0.0
          'y': 0.0
          z: 100.0
    default: test_data/assets/du.json
    update:
    - attributes:
        aerial_du_fft_size: 4096
        aerial_du_max_channel_bandwidth: 100.0
        aerial_du_num_antennas: 64
        aerial_du_reference_freq: 3600.0
        aerial_du_subcarrier_spacing: 30.0
      ids:
      - 1
  Materials:
    default: test_data/assets/materials.json
  Panels:
    add:
    - id: 1
    - id: 2
    default: test_data/assets/panel.json
    update:
    - attributes:
        antenna_names:
        - infinitesimal_dipole
        antenna_roll_angle_first_polz_degree: -45.0
        antenna_roll_angle_second_polz_degree: 45.0
        antenna_spacing_horz_mm: 41.63784138888889
        antenna_spacing_vert_mm: 41.63784138888889
        dual_polarized: true
        num_loc_antenna_horz: 1
        num_loc_antenna_vert: 2
        reference_freq_mhz: 3600.0
      ids:
      - 1
    - attributes:
        antenna_names:
        - threeGPP_38901
        antenna_roll_angle_first_polz_degree: 0.0
        antenna_roll_angle_second_polz_degree: 90.0
        antenna_spacing_horz_mm: 41.63784138888889
        antenna_spacing_vert_mm: 41.63784138888889
        dual_polarized: false
        num_loc_antenna_horz: 8
        num_loc_antenna_vert: 8
        reference_freq_mhz: 3600.0
      ids:
      - 2
  RUs:
    add:
    - id: 1
      position:
        pos:
          lat: 35.663692
          lon: 139.743236
    default: test_data/assets/gnb.json
    update:
    - attributes:
        aerial_gnb_carrier_freq: 3600.0
        aerial_gnb_du_id: 1
        aerial_gnb_du_manual_assign: true
        aerial_gnb_height: 40.0
        aerial_gnb_mech_azimuth: 0.0
        aerial_gnb_mech_tilt: 0.0
        aerial_gnb_panel_type: 2
        aerial_gnb_radiated_power: 43.0
      ids:
      - 1
  Scatterers:
    default: test_data/assets/car_small.json
  Scenario:
    default: test_data/assets/scenario.json
    update:
    - attributes:
        sim_batches: 1
        sim_duration: 0.0
        sim_em_diffuse_type: 1
        sim_em_fast_mode: true
        sim_em_interactions: 5
        sim_em_max_num_paths_per_ant_pair: 500
        sim_em_rays: 500
        sim_enable_wideband: false
        sim_gnb_panel_type: 2
        sim_interval: 0.0
        sim_is_full: false
        sim_is_seeded: true
        sim_num_procedural_ues: 10
        sim_perc_indoor_procedural_ues: 0.0
        sim_samples_per_slot: 1
        sim_seed: 10
        sim_simulation_mode: 1
        sim_slots_per_batch: 100
        sim_ue_panel_type: 1
  UEs:
    default: test_data/assets/ue.json
  VegetationMaterials:
    default: test_data/assets/vegetation_materials.json
